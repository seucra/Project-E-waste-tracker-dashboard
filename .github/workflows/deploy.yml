name: Deploy E-Waste Tracker Dashboard to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare dist bundle
        run: |
          mkdir -p dist
          cp index.html dist/
          cp REPORT.md dist/
          cp report2.md dist/
          cp State_EWaste_Tracker_Final.xlsx dist/
          cp -r css dist/
          cp -r js dist/
          echo "project.seucra.tech" > dist/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
